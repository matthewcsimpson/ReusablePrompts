name: adapters

on:
  pull_request:
    paths:
      - "**/*.prompt.md"
      - "tools/generate-adapters.py"
      - ".claude/skills/**"
      - ".claude/commands/**"
      - ".cursor/commands/**"
      - ".github/prompts/**"
      - "AGENTS.md"
      - ".github/copilot-instructions.md"
      - ".github/workflows/adapters.yml"
  push:
    branches: [main]

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify generated adapters match source prompts
        run: python3 tools/generate-adapters.py --check
